<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタジオ予約システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #e0e0e0;
            color: #555;
        }

        .nav-tab:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            min-height: 600px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 申請フォーム */
        .form-section h2 {
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.85rem;
        }

        /* 管理画面テーブル */
        .admin-section h2 {
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending { background: #fff3cd; color: #856404; }
        .status-approved { background: #d4edda; color: #155724; }
        .status-rejected { background: #f8d7da; color: #721c24; }
        .status-cancelled { background: #e9ecef; color: #6c757d; }

        .action-buttons {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
        }

        /* カレンダー */
        .calendar-section h2 {
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .calendar-legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .studio-a { background: #3498db; }
        .studio-b { background: #27ae60; }
        .studio-c { background: #e74c3c; }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #27ae60; }
        .notification.error { background: #e74c3c; }

        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .google-section { background: #f8f9fa; border-radius: 10px; padding: 20px; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 スタジオ予約システム</h1>
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="booking">📝 予約申請</button>
                <button class="nav-tab" data-tab="admin">👤 管理・承認</button>
                <button class="nav-tab" data-tab="calendar">📅 カレンダー</button>
            </nav>
        </header>

        <main class="content">
            <div id="booking" class="tab-content active">
                <div class="form-section">
                    <h2>📝 スタジオ予約申請フォーム</h2>
                    <form id="bookingForm">
                        <div class="form-grid">
                            <div class="form-group"><label>部署名<span class="required">*</span></label><input type="text" id="department" required></div>
                            <div class="form-group"><label>氏名<span class="required">*</span></label><input type="text" id="name" required></div>
                            <div class="form-group">
                                <label>スタジオ<span class="required">*</span></label>
                                <select id="studio" required>
                                    <option value="">選択してください</option>
                                    <option value="A">Aスタジオ</option>
                                    <option value="B">Bスタジオ</option>
                                    <option value="C">Cスタジオ</option>
                                </select>
                            </div>
                            <div class="form-group"><label>予約日<span class="required">*</span></label><input type="date" id="bookingDate" required></div>
                            <div class="form-group"><label>開始時間<span class="required">*</span></label><input type="time" id="startTime" required></div>
                            <div class="form-group"><label>終了時間<span class="required">*</span></label><input type="time" id="endTime" required></div>
                        </div>
                        <div class="form-group"><label>利用目的<span class="required">*</span></label><textarea id="purpose" required></textarea></div>
                        <button type="submit" class="btn btn-primary">予約を申請する</button>
                    </form>
                    <div class="google-section">
                        <h3>📅 カレンダー連携</h3>
                        <p>承認された予約は自動的にカレンダーに登録されます。</p>
                    </div>
                </div>
            </div>

            <div id="admin" class="tab-content">
                <div class="admin-section">
                    <h2>👤 予約管理・承認</h2>
                    <div class="filter-bar">
                        <select id="statusFilter"><option value="all">すべてのステータス</option><option value="pending">承認待ち</option><option value="approved">承認済み</option><option value="cancelled">キャンセル済</option><option value="rejected">却下</option></select>
                        <select id="studioFilter"><option value="all">すべてのスタジオ</option><option value="A">Aスタジオ</option><option value="B">Bスタジオ</option><option value="C">Cスタジオ</option></select>
                    </div>
                    <div class="table-container">
                        <table>
                            <thead><tr><th>ID</th><th>部署</th><th>氏名</th><th>スタジオ</th><th>日時</th><th>ステータス</th><th>操作</th></tr></thead>
                            <tbody id="bookingsBody"></tbody>
                        </table>
                    </div>
                    <div id="emptyState" style="text-align:center; padding:40px; display:none;">予約がありません</div>
                </div>
            </div>

            <div id="calendar" class="tab-content">
                <div class="calendar-section">
                    <h2>📅 予約カレンダー</h2>
                    <div class="calendar-legend">
                        <div class="legend-item"><div class="legend-color studio-a"></div><span>Aスタジオ</span></div>
                        <div class="legend-item"><div class="legend-color studio-b"></div><span>Bスタジオ</span></div>
                        <div class="legend-item"><div class="legend-color studio-c"></div><span>Cスタジオ</span></div>
                    </div>
                    <div id="calendarView"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h3>📋 予約詳細</h3><button class="modal-close" onclick="closeModal()">&times;</button></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script>
        let bookings = JSON.parse(localStorage.getItem('studioBookings')) || [];
        let calendar;

        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            initForm();
            initFilters();
            initCalendar();
            renderBookings();
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('bookingDate').min = today;
        });

        function initTabs() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                    if (tab.dataset.tab === 'calendar') setTimeout(() => calendar.render(), 100);
                });
            });
        }

        function initForm() {
            document.getElementById('bookingForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const booking = {
                    id: 'BK' + Date.now().toString(36).toUpperCase(),
                    department: document.getElementById('department').value,
                    name: document.getElementById('name').value,
                    studio: document.getElementById('studio').value,
                    date: document.getElementById('bookingDate').value,
                    startTime: document.getElementById('startTime').value,
                    endTime: document.getElementById('endTime').value,
                    purpose: document.getElementById('purpose').value,
                    status: 'pending',
                    createdAt: new Date().toISOString()
                };

                if (booking.startTime >= booking.endTime) return showNotification('時間は正しく設定してください', 'error');
                if (bookings.some(b => b.status === 'approved' && b.studio === booking.studio && b.date === booking.date && (booking.startTime < b.endTime && booking.endTime > b.startTime))) {
                    return showNotification('既に予約があります', 'error');
                }

                bookings.push(booking);
                saveBookings();
                showNotification('申請完了', 'success');
                document.getElementById('bookingForm').reset();
                renderBookings();
            });
        }

        function initFilters() {
            document.getElementById('statusFilter').addEventListener('change', renderBookings);
            document.getElementById('studioFilter').addEventListener('change', renderBookings);
        }

        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendarView'), {
                initialView: 'dayGridMonth',
                locale: 'ja',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: getCalendarEvents(),
                eventClick: (info) => showBookingDetail(info.event.id)
            });
            calendar.render();
        }

        function getCalendarEvents() {
            const colors = { 'A': '#3498db', 'B': '#27ae60', 'C': '#e74c3c' };
            return bookings.filter(b => b.status === 'approved').map(b => ({
                id: b.id, title: `スタジオ${b.studio}:${b.name}`, start: `${b.date}T${b.startTime}`, end: `${b.date}T${b.endTime}`, backgroundColor: colors[b.studio], borderColor: colors[b.studio]
            }));
        }

        function renderBookings() {
            const sFilter = document.getElementById('statusFilter').value;
            const stFilter = document.getElementById('studioFilter').value;
            const filtered = bookings.filter(b => (sFilter === 'all' || b.status === sFilter) && (stFilter === 'all' || b.studio === stFilter));
            
            const tbody = document.getElementById('bookingsBody');
            tbody.innerHTML = filtered.sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt)).map(b => `
                <tr>
                    <td>${b.id}</td>
                    <td>${b.department}</td>
                    <td>${b.name}</td>
                    <td>${b.studio}</td>
                    <td>${b.date}<br>${b.startTime}-${b.endTime}</td>
                    <td><span class="status-badge status-${b.status}">${getStatusText(b.status)}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm btn-secondary" onclick="showBookingDetail('${b.id}')">詳細</button>
                            ${b.status === 'pending' ? `<button class="btn btn-sm btn-success" onclick="updateStatus('${b.id}', 'approved')">承認</button><button class="btn btn-sm btn-danger" onclick="updateStatus('${b.id}', 'rejected')">却下</button>` : ''}
                            ${b.status === 'approved' ? `<button class="btn btn-sm btn-danger" onclick="updateStatus('${b.id}', 'cancelled')">キャンセル</button>` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
            document.getElementById('emptyState').style.display = filtered.length ? 'none' : 'block';
        }

        function updateStatus(id, newStatus) {
            const b = bookings.find(x => x.id === id);
            if (!b) return;
            if (newStatus === 'cancelled' && !confirm('承認済みの予約をキャンセルしますか？（カレンダーからも削除されます）')) return;
            
            b.status = newStatus;
            saveBookings();
            renderBookings();
            calendar.removeAllEvents();
            calendar.addEventSource(getCalendarEvents());
            showNotification(`ステータスを${getStatusText(newStatus)}に変更しました`, 'success');
        }

        function showBookingDetail(id) {
            const b = bookings.find(x => x.id === id);
            document.getElementById('modalBody').innerHTML = `<p>ID: ${b.id}</p><p>部署: ${b.department}</p><p>氏名: ${b.name}</p><p>目的: ${b.purpose}</p><p>状態: ${getStatusText(b.status)}</p>`;
            document.getElementById('detailModal').classList.add('show');
        }

        function getStatusText(s) {
            return { 'pending': '承認待ち', 'approved': '承認済み', 'rejected': '却下', 'cancelled': 'キャンセル済' }[s] || s;
        }

        function saveBookings() { localStorage.setItem('studioBookings', JSON.stringify(bookings)); }
        function closeModal() { document.getElementById('detailModal').classList.remove('show'); }
        function showNotification(m, t) {
            const n = document.createElement('div'); n.className = `notification ${t}`; n.textContent = m;
            document.body.appendChild(n); setTimeout(() => n.remove(), 3000);
        }
    </script>
</body>
</html>
