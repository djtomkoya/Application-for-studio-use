<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スタジオ予約システム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            color: #333;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .nav-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-tab {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            background: #e0e0e0;
            color: #555;
        }

        .nav-tab:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
        }

        .nav-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .content {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            min-height: 600px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 申請フォーム */
        .form-section h2 {
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-weight: 600;
            color: #444;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .form-group label .required {
            color: #e74c3c;
            margin-left: 4px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #27ae60;
            color: white;
        }

        .btn-success:hover {
            background: #219a52;
        }

        .btn-danger {
            background: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background: #c0392b;
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 0.9rem;
        }

        /* 管理画面テーブル */
        .admin-section h2 {
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-bar select {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #333;
            white-space: nowrap;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-approved {
            background: #d4edda;
            color: #155724;
        }

        .status-rejected {
            background: #f8d7da;
            color: #721c24;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
        }

        /* カレンダー */
        .calendar-section h2 {
            color: #333;
            margin-bottom: 25px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .calendar-legend {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 4px;
        }

        .studio-a { background: #e74c3c; }
        .studio-b { background: #3498db; }
        .studio-c { background: #27ae60; }

        #calendar {
            max-width: 100%;
        }

        .fc-event {
            cursor: pointer;
            padding: 2px 5px;
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-header h3 {
            color: #333;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .modal-body p {
            margin-bottom: 10px;
            color: #555;
        }

        .modal-body strong {
            color: #333;
        }

        /* 通知 */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .notification.success {
            background: #27ae60;
        }

        .notification.error {
            background: #e74c3c;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Google連携セクション */
        .google-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }

        .google-section h3 {
            color: #333;
            margin-bottom: 15px;
        }

        .google-info {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #666;
        }

        .google-info svg {
            width: 24px;
            height: 24px;
        }

        /* 空状態 */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* レスポンシブ */
        @media (max-width: 768px) {
            .nav-tabs {
                flex-direction: column;
            }

            .nav-tab {
                width: 100%;
                text-align: center;
            }

            .action-buttons {
                flex-direction: column;
            }

            th, td {
                padding: 10px 8px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 スタジオ予約システム</h1>
            <nav class="nav-tabs">
                <button class="nav-tab active" data-tab="booking">📝 予約申請</button>
                <button class="nav-tab" data-tab="admin">👤 管理・承認</button>
                <button class="nav-tab" data-tab="calendar">📅 カレンダー</button>
            </nav>
        </header>

        <main class="content">
            <!-- 予約申請タブ -->
            <div id="booking" class="tab-content active">
                <div class="form-section">
                    <h2>📝 スタジオ予約申請フォーム</h2>
                    <form id="bookingForm">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>部署名<span class="required">*</span></label>
                                <input type="text" id="department" required placeholder="例: SVP">
                            </div>
                            <div class="form-group">
                                <label>氏名<span class="required">*</span></label>
                                <input type="text" id="name" required placeholder="例: しょっぷ ななこ"> 
                            </div>
                            <div class="form-group">
                                <label>スタジオ<span class="required">*</span></label>
                                <select id="studio" required>
                                    <option value="">選択してください</option>
                                    <option value="A">スタジオA</option>
                                    <option value="B">スタジオB</option>
                                    <option value="C">スタジオC</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>予約日<span class="required">*</span></label>
                                <input type="date" id="bookingDate" required>
                            </div>
                            <div class="form-group">
                                <label>開始時間<span class="required">*</span></label>
                                <input type="time" id="startTime" required>
                            </div>
                            <div class="form-group">
                                <label>終了時間<span class="required">*</span></label>
                                <input type="time" id="endTime" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>利用目的<span class="required">*</span></label>
                            <textarea id="purpose" required placeholder="例: 新商品プロモーション動画の撮影"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">予約を申請する</button>
                    </form>

                    <div class="google-section">
                        <h3>📆 Googleカレンダー連携</h3>
                        <div class="google-info">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
                            </svg>
                            <span>承認された予約は自動的にGoogleカレンダーに登録されます</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 管理・承認タブ -->
            <div id="admin" class="tab-content">
                <div class="admin-section">
                    <h2>👤 予約管理・承認</h2>
                    <div class="filter-bar">
                        <label>ステータス:</label>
                        <select id="statusFilter">
                            <option value="all">すべて</option>
                            <option value="pending">承認待ち</option>
                            <option value="approved">承認済み</option>
                            <option value="rejected">却下</option>
                        </select>
                        <label>スタジオ:</label>
                        <select id="studioFilter">
                            <option value="all">すべて</option>
                            <option value="A">スタジオA</option>
                            <option value="B">スタジオB</option>
                            <option value="C">スタジオC</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table id="bookingsTable">
                            <thead>
                                <tr>
                                    <th>申請ID</th>
                                    <th>部署</th>
                                    <th>氏名</th>
                                    <th>スタジオ</th>
                                    <th>日時</th>
                                    <th>ステータス</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="bookingsBody">
                            </tbody>
                        </table>
                    </div>
                    <div id="emptyState" class="empty-state" style="display: none;">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14zM7 10h2v7H7zm4-3h2v10h-2zm4 6h2v4h-2z"/>
                        </svg>
                        <p>予約申請がありません</p>
                    </div>
                </div>
            </div>

            <!-- カレンダータブ -->
            <div id="calendar" class="tab-content">
                <div class="calendar-section">
                    <h2>📅 予約カレンダー</h2>
                    <div class="calendar-legend">
                        <div class="legend-item">
                            <div class="legend-color studio-a"></div>
                            <span>スタジオA</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color studio-b"></div>
                            <span>スタジオB</span>
                        </div>
                        <div class="legend-item">
                            <div class="legend-color studio-c"></div>
                            <span>スタジオC</span>
                        </div>
                    </div>
                    <div id="calendarView"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- 詳細モーダル -->
    <div id="detailModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📋 予約詳細</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script>
        // データ管理
        let bookings = JSON.parse(localStorage.getItem('studioBookings')) || [];
        let calendar;

        // 初期化
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            initForm();
            initFilters();
            initCalendar();
            renderBookings();
            setMinDate();
        });

        // タブ切り替え
        function initTabs() {
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.tab).classList.add('active');
                    if (tab.dataset.tab === 'calendar') {
                        setTimeout(() => calendar.render(), 100);
                    }
                });
            });
        }

        // 最小日付設定
        function setMinDate() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('bookingDate').min = today;
        }

        // フォーム初期化
        function initForm() {
            document.getElementById('bookingForm').addEventListener('submit', (e) => {
                e.preventDefault();
                submitBooking();
            });
        }

        // フィルター初期化
        function initFilters() {
            document.getElementById('statusFilter').addEventListener('change', renderBookings);
            document.getElementById('studioFilter').addEventListener('change', renderBookings);
        }

        // カレンダー初期化
        function initCalendar() {
            const calendarEl = document.getElementById('calendarView');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'ja',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth,timeGridWeek,timeGridDay'
                },
                events: getCalendarEvents(),
                eventClick: (info) => {
                    showBookingDetail(info.event.extendedProps.bookingId);
                }
            });
            calendar.render();
        }

        // カレンダーイベント取得
        function getCalendarEvents() {
            const studioColors = {
                'A': '#3498db',
                'B': '#27ae60',
                'C': '#e74c3c'
            };

            return bookings
                .filter(b => b.status === 'approved')
                .map(b => ({
                    id: b.id,
                    title: `スタジオ${b.studio} - ${b.name}`,
                    start: `${b.date}T${b.startTime}`,
                    end: `${b.date}T${b.endTime}`,
                    backgroundColor: studioColors[b.studio],
                    borderColor: studioColors[b.studio],
                    extendedProps: { bookingId: b.id }
                }));
        }

        // 予約申請
        function submitBooking() {
            const booking = {
                id: generateId(),
                department: document.getElementById('department').value,
                name: document.getElementById('name').value,
                studio: document.getElementById('studio').value,
                date: document.getElementById('bookingDate').value,
                startTime: document.getElementById('startTime').value,
                endTime: document.getElementById('endTime').value,
                purpose: document.getElementById('purpose').value,
                status: 'pending',
                createdAt: new Date().toISOString()
            };

            // 時間バリデーション
            if (booking.startTime >= booking.endTime) {
                showNotification('開始時間は終了時間より前に設定してください', 'error');
                return;
            }

            // 重複チェック
            if (checkDuplicate(booking)) {
                showNotification('同じスタジオ・日時に既に予約があります', 'error');
                return;
            }

            bookings.push(booking);
            saveBookings();
            showNotification('予約申請を送信しました！', 'success');
            document.getElementById('bookingForm').reset();
            setMinDate();
        }

        // 重複チェック
        function checkDuplicate(newBooking, excludeId = null) {
            return bookings.some(b => {
                if (b.id === excludeId) return false;
                if (b.status === 'rejected') return false;
                if (b.studio !== newBooking.studio) return false;
                if (b.date !== newBooking.date) return false;
                
                const newStart = newBooking.startTime;
                const newEnd = newBooking.endTime;
                const existStart = b.startTime;
                const existEnd = b.endTime;
                
                return (newStart < existEnd && newEnd > existStart);
            });
        }

        // 予約一覧表示
        function renderBookings() {
            const statusFilter = document.getElementById('statusFilter').value;
            const studioFilter = document.getElementById('studioFilter').value;
            const tbody = document.getElementById('bookingsBody');
            const emptyState = document.getElementById('emptyState');

            let filtered = bookings.filter(b => {
                if (statusFilter !== 'all' && b.status !== statusFilter) return false;
                if (studioFilter !== 'all' && b.studio !== studioFilter) return false;
                return true;
            });

            // 日付でソート（新しい順）
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            tbody.innerHTML = filtered.map(b => `
                <tr>
                    <td>${b.id}</td>
                    <td>${escapeHtml(b.department)}</td>
                    <td>${escapeHtml(b.name)}</td>
                    <td>スタジオ${b.studio}</td>
                    <td>${formatDate(b.date)}<br>${b.startTime}〜${b.endTime}</td>
                    <td><span class="status-badge status-${b.status}">${getStatusText(b.status)}</span></td>
                    <td>
                        <div class="action-buttons">
                            <button class="btn btn-sm" onclick="showBookingDetail('${b.id}')">詳細</button>
                            ${b.status === 'pending' ? `
                                <button class="btn btn-sm btn-success" onclick="approveBooking('${b.id}')">承認</button>
                                <button class="btn btn-sm btn-danger" onclick="rejectBooking('${b.id}')">却下</button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 承認処理
        function approveBooking(id) {
            const booking = bookings.find(b => b.id === id);
            if (!booking) return;

            // 承認時に再度重複チェック
            if (checkDuplicate(booking, id)) {
                showNotification('この時間帯には既に承認済みの予約があります', 'error');
                return;
            }

            booking.status = 'approved';
            booking.approvedAt = new Date().toISOString();
            saveBookings();
            renderBookings();
            updateCalendar();
            showNotification('予約を承認しました。Googleカレンダーに登録されました。', 'success');
            
            // Googleカレンダー連携のシミュレーション
            console.log('Google Calendar API 連携:', {
                action: 'create',
                summary: `スタジオ${booking.studio}予約 - ${booking.name}`,
                start: `${booking.date}T${booking.startTime}`,
                end: `${booking.date}T${booking.endTime}`,
                description: `部署: ${booking.department}\n目的: ${booking.purpose}`
            });
        }

        // 却下処理
        function rejectBooking(id) {
            const booking = bookings.find(b => b.id === id);
            if (!booking) return;

            if (confirm('この予約を却下しますか？')) {
                booking.status = 'rejected';
                booking.rejectedAt = new Date().toISOString();
                saveBookings();
                renderBookings();
                showNotification('予約を却下しました', 'success');
            }
        }

        // 詳細表示
        function showBookingDetail(id) {
            const booking = bookings.find(b => b.id === id);
            if (!booking) return;

            document.getElementById('modalBody').innerHTML = `
                <p><strong>申請ID:</strong> ${booking.id}</p>
                <p><strong>部署名:</strong> ${escapeHtml(booking.department)}</p>
                <p><strong>氏名:</strong> ${escapeHtml(booking.name)}</p>
                <p><strong>スタジオ:</strong> スタジオ${booking.studio}</p>
                <p><strong>予約日:</strong> ${formatDate(booking.date)}</p>
                <p><strong>時間:</strong> ${booking.startTime} 〜 ${booking.endTime}</p>
                <p><strong>利用目的:</strong> ${escapeHtml(booking.purpose)}</p>
                <p><strong>ステータス:</strong> <span class="status-badge status-${booking.status}">${getStatusText(booking.status)}</span></p>
                <p><strong>申請日時:</strong> ${formatDateTime(booking.createdAt)}</p>
                ${booking.approvedAt ? `<p><strong>承認日時:</strong> ${formatDateTime(booking.approvedAt)}</p>` : ''}
                ${booking.rejectedAt ? `<p><strong>却下日時:</strong> ${formatDateTime(booking.rejectedAt)}</p>` : ''}
            `;
            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('detailModal').classList.remove('show');
        }

        // カレンダー更新
        function updateCalendar() {
            calendar.removeAllEvents();
            calendar.addEventSource(getCalendarEvents());
        }

        // ユーティリティ関数
        function generateId() {
            return 'BK' + Date.now().toString(36).toUpperCase();
        }

        function saveBookings() {
            localStorage.setItem('studioBookings', JSON.stringify(bookings));
        }

        function getStatusText(status) {
            const texts = {
                'pending': '承認待ち',
                'approved': '承認済み',
                'rejected': '却下'
            };
            return texts[status] || status;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
        }

        function formatDateTime(isoStr) {
            const date = new Date(isoStr);
            return date.toLocaleString('ja-JP');
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }

        // モーダル外クリックで閉じる
        document.getElementById('detailModal').addEventListener('click', (e) => {
            if (e.target.id === 'detailModal') closeModal();
        });
    </script>
</body>
</html>
